name: Daily Data Collection

on:
  schedule:
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize DB if not exists
        run: |
          if [ ! -f data/travel_data.db ]; then
            echo "Database not found — initializing..."
            python scripts/init_db.py
          else
            echo "Database exists — skipping init"
          fi

      - name: Run daily scrape
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python scripts/daily_scrape.py

      - name: Generate dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_dashboard.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/travel_data.db docs/index.html
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u '+%Y-%m-%d')"
          git push
